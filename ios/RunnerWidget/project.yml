name: RunnerWidget
options:
  bundleIdPrefix: com.example.taskit
  deploymentTarget:
    iOS: "17.0"
targets:
  RunnerWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        excludes:
          - project.yml
          - "*.xcodeproj/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.taskit.Widget
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: RunnerWidgetExtension.entitlements
        ENABLE_PREVIEWS: "NO"
        SWIFT_VERSION: "5.0"
        SKIP_INSTALL: "YES"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        AD_HOC_CODE_SIGNING_ALLOWED: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: AppIntents.framework
